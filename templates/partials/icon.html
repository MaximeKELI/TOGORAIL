{% comment %}Renders an inline SVG icon based on `icon` name. Defaults to rail.{% endcomment %}
<svg class="h-7 w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
{% if icon == "cargo" %}
  <path d="M3 7h13v8H3z"/><path d="M16 10h4l1 3v2h-5"/><circle cx="7" cy="18" r="1.6"/><circle cx="17.5" cy="18" r="1.6"/>
{% elif icon == "network" %}
  <circle cx="5" cy="6" r="2"/><circle cx="19" cy="6" r="2"/><circle cx="12" cy="18" r="2"/><path d="M6.6 7.4 10.6 16M17.4 7.4 13.4 16M7 6h10"/>
{% elif icon == "bolt" %}
  <path d="M13 2 4 14h7l-1 8 9-12h-7z"/>
{% elif icon == "shield" %}
  <path d="M12 3 5 6v5c0 4.5 3 8 7 10 4-2 7-5.5 7-10V6z"/><path d="m9 12 2 2 4-4"/>
{% elif icon == "globe" %}
  <circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 3 2.5 15 0 18M12 3c-2.5 3-2.5 15 0 18"/>
{% else %}
  <path d="M8 3h8v13H8z"/><path d="M8 8h8M9 20l-2 2M15 20l2 2M9.5 16v2M14.5 16v2"/><circle cx="10" cy="12.5" r="0.8"/><circle cx="14" cy="12.5" r="0.8"/>
{% endif %}
</svg>
