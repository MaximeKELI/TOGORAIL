<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1628"/>
      <stop offset="0.55" stop-color="#070b14"/>
      <stop offset="1" stop-color="#05070c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="18%" r="55%">
      <stop offset="0" stop-color="#c9a227" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#c9a227" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8d48b" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#c9a227" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- horizon -->
  <line x1="0" y1="560" x2="1600" y2="560" stroke="#c9a227" stroke-opacity="0.15" stroke-width="1"/>

  <!-- perspective rails converging to vanishing point -->
  <g stroke="url(#rail)" stroke-width="3" fill="none" opacity="0.85">
    <path d="M760 560 L120 900"/>
    <path d="M840 560 L1480 900"/>
    <path d="M775 560 L470 900"/>
    <path d="M825 560 L1130 900"/>
  </g>

  <!-- sleepers -->
  <g stroke="#c9a227" stroke-opacity="0.12" stroke-width="6">
    <line x1="520" y1="640" x2="1080" y2="640"/>
    <line x1="440" y1="700" x2="1160" y2="700"/>
    <line x1="350" y1="770" x2="1250" y2="770"/>
    <line x1="240" y1="850" x2="1360" y2="850"/>
  </g>

  <!-- distant city / infrastructure silhouette -->
  <g fill="#0d1a30" opacity="0.9">
    <rect x="180" y="470" width="60" height="90"/>
    <rect x="260" y="440" width="40" height="120"/>
    <rect x="320" y="500" width="70" height="60"/>
    <rect x="1120" y="480" width="50" height="80"/>
    <rect x="1190" y="430" width="45" height="130"/>
    <rect x="1250" y="490" width="65" height="70"/>
  </g>

  <!-- floating particles -->
  <g fill="#e8d48b">
    <circle cx="400" cy="220" r="2" opacity="0.6"/>
    <circle cx="1200" cy="180" r="2.5" opacity="0.5"/>
    <circle cx="900" cy="120" r="1.8" opacity="0.7"/>
    <circle cx="650" cy="300" r="1.5" opacity="0.4"/>
    <circle cx="1050" cy="340" r="2" opacity="0.5"/>
    <circle cx="300" cy="350" r="1.6" opacity="0.5"/>
  </g>
</svg>
